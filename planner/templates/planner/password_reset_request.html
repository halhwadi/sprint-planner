{% extends "planner/base_auth.html" %}
{% block title %}Reset Password — SprintFlow{% endblock %}
{% block content %}
<div class="auth-box">
    <div class="auth-logo">⚡ SprintFlow</div>
    <h1 class="auth-title">Reset your password</h1>

    {% if message %}
    <div class="auth-success">{{ message }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required autofocus>
        </div>
        <button type="submit" class="btn-primary">Send Reset Link →</button>
    </form>

    <p class="auth-footer">
        <a href="{% url 'user_login' %}">Back to login</a>
    </p>
</div>
{% endblock %}
