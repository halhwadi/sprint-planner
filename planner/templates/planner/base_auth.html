<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SprintFlow{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #F5F3FF;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .auth-box {
            background: white;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 4px 24px rgba(79,70,229,0.08);
        }
        .auth-logo {
            font-size: 22px;
            font-weight: 800;
            color: #4F46E5;
            margin-bottom: 24px;
        }
        .auth-title {
            font-size: 24px;
            font-weight: 700;
            color: #1E1B4B;
            margin-bottom: 6px;
        }
        .auth-subtitle {
            color: #6B7280;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .auth-error {
            background: #FEF2F2;
            border: 1px solid #FECACA;
            color: #DC2626;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .auth-success {
            background: #F0FDF4;
            border: 1px solid #BBF7D0;
            color: #16A34A;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #D1D5DB;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #4F46E5;
            box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
        }
        .btn-primary {
            width: 100%;
            background: #4F46E5;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            text-decoration: none;
            text-align: center;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: #4338CA; }
        .auth-footer {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #6B7280;
        }
        .auth-footer a { color: #4F46E5; text-decoration: none; font-weight: 500; }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
