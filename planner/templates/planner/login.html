{% extends "planner/base_auth.html" %}
{% block title %}Log In — SprintFlow{% endblock %}
{% block content %}
<div class="auth-box">
    <div class="auth-logo">⚡ SprintFlow</div>
    <h1 class="auth-title">Welcome back</h1>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required autofocus>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn-primary">Log In →</button>
    </form>

    <p class="auth-footer">
        <a href="{% url 'password_reset_request' %}">Forgot your password?</a>
    </p>
    <p class="auth-footer">
        No account? <a href="{% url 'signup' %}">Start free trial</a>
    </p>
</div>
{% endblock %}
