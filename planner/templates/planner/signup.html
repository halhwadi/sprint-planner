{% extends "planner/base_auth.html" %}
{% block title %}Sign Up — SprintFlow{% endblock %}
{% block content %}
<div class="auth-box">
    <div class="auth-logo">⚡ SprintFlow</div>
    <h1 class="auth-title">Start your free trial</h1>
    <p class="auth-subtitle">14 days free, no credit card required</p>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-row">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="first_name" required autofocus>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="last_name" required>
            </div>
        </div>
        <div class="form-group">
            <label>Work Email</label>
            <input type="email" name="email" required placeholder="you@company.com">
        </div>
        <div class="form-group">
            <label>Organization Name</label>
            <input type="text" name="org_name" required placeholder="Your team or company name">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required minlength="8">
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" name="password2" required>
        </div>
        <button type="submit" class="btn-primary">Create Account →</button>
    </form>

    <p class="auth-footer">
        Already have an account? <a href="{% url 'user_login' %}">Log in</a>
    </p>
</div>
{% endblock %}
