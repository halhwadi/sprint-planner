{% extends "planner/base_auth.html" %}
{% block title %}New Password — SprintFlow{% endblock %}
{% block content %}
<div class="auth-box">
    <div class="auth-logo">⚡ SprintFlow</div>
    <h1 class="auth-title">Set new password</h1>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>New Password</label>
            <input type="password" name="password" required minlength="8" autofocus>
        </div>
        <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" name="password2" required>
        </div>
        <button type="submit" class="btn-primary">Set Password →</button>
    </form>
</div>
{% endblock %}
